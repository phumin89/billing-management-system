name: Frontend and Backend Validation

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Billing_dev_2026!
        ports:
          - 14333:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Billing_dev_2026!' -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore BillingManagement.slnx

      - name: Format gate
        run: dotnet format BillingManagement.slnx --verify-no-changes --no-restore

      - name: Frontend build
        run: dotnet build src/BillingManagement.Client/BillingManagement.Client.csproj --configuration Release --no-restore

      - name: Frontend tests (not configured)
        run: echo "No frontend test project exists yet. Add one under tests/ when frontend test coverage is introduced."

      - name: Backend/full solution build
        run: dotnet build BillingManagement.slnx --configuration Release --no-restore

      - name: Backend unit tests
        run: dotnet test tests/BillingManagement.UnitTests/BillingManagement.UnitTests.csproj --configuration Release --no-build --verbosity normal

      - name: Integration tests
        run: dotnet test tests/BillingManagement.IntegrationTests/BillingManagement.IntegrationTests.csproj --configuration Release --no-build --verbosity normal
