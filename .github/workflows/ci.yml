name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore BillingManagement.slnx

      - name: Build
        run: dotnet build BillingManagement.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test BillingManagement.slnx --configuration Release --no-build --verbosity normal
