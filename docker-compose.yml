services:
  client:
    build:
      context: .
      dockerfile: src/BillingManagement.Client/Dockerfile
    ports:
      - "5080:80"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: src/BillingManagement.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=BillingManagement;User Id=sa;Password=${BMS_DB_PASSWORD:-Billing_dev_2026!};TrustServerCertificate=True;MultipleActiveResultSets=True"
      CompanyMediaStorage__RootPath: /var/lib/billing-management/company-media
    ports:
      - "5081:8080"
    volumes:
      - billingmanagement-company-media:/var/lib/billing-management/company-media
    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${BMS_DB_PASSWORD:-Billing_dev_2026!}"
    ports:
      - "14333:1433"
    volumes:
      - billingmanagement-sqlserver:/var/opt/mssql

  migrator:
    build:
      context: .
      dockerfile: src/BillingManagement.Migrator/Dockerfile
    profiles:
      - tools
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=BillingManagement;User Id=sa;Password=${BMS_DB_PASSWORD:-Billing_dev_2026!};TrustServerCertificate=True;MultipleActiveResultSets=True"
    depends_on:
      - sqlserver

volumes:
  billingmanagement-company-media:
  billingmanagement-sqlserver:

